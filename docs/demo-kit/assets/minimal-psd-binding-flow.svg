<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Fdesign 最小 PSD 模板绑定关系图</title>
  <desc id="desc">展示 Photoshop 图层命名、Fdesign 商品位绑定、CSV 字段和导出预览之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#16c7a7"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      text {
        font-family: "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", SimSun, serif;
        letter-spacing: 0;
      }
      .label {
        fill: #d8e4f4;
        font-size: 24px;
        font-weight: 700;
      }
      .sub {
        fill: #90a4bd;
        font-size: 16px;
      }
      .small {
        fill: #b8c7da;
        font-size: 15px;
      }
      .code {
        fill: #e6fff9;
        font-size: 18px;
        font-weight: 700;
      }
      .panel {
        fill: #101a2a;
        stroke: rgba(255,255,255,0.14);
        stroke-width: 1.5;
      }
      .chip {
        fill: #16243a;
        stroke: rgba(255,255,255,0.12);
        stroke-width: 1;
      }
      .line {
        stroke: #2dd4bf;
        stroke-width: 3;
        stroke-linecap: round;
        fill: none;
      }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="38" y="34" width="1124" height="652" rx="26" fill="#0b1422" stroke="rgba(255,255,255,0.10)" filter="url(#softShadow)"/>

  <text x="72" y="86" fill="#f8fafc" font-size="32" font-weight="800">最小 PSD 试跑：图层命名到字段绑定</text>
  <text x="72" y="118" class="sub">先用公开演示数据跑通一条记录，再迁移到真实模板；不要公开私有 PSD 或真实商品素材。</text>

  <g transform="translate(72 158)">
    <rect class="panel" width="284" height="434" rx="18"/>
    <text x="24" y="42" class="label">Photoshop 图层</text>
    <text x="24" y="70" class="sub">本机 PSD 里保留这些图层名</text>
    <rect x="24" y="102" width="236" height="46" rx="10" fill="#0f766e" opacity="0.26" stroke="#2dd4bf"/>
    <text x="42" y="132" class="code">hero_image</text>
    <rect x="72" y="172" width="140" height="84" rx="42" fill="none" stroke="#d9b66f" stroke-width="8"/>
    <path d="M130 212 C154 188, 192 188, 212 212" stroke="#d9b66f" stroke-width="8" fill="none" stroke-linecap="round"/>
    <line x1="72" y1="214" x2="40" y2="204" stroke="#d9b66f" stroke-width="8" stroke-linecap="round"/>
    <line x1="212" y1="214" x2="244" y2="204" stroke="#d9b66f" stroke-width="8" stroke-linecap="round"/>
    <rect x="24" y="286" width="236" height="34" rx="8" class="chip"/>
    <text x="42" y="309" class="small">title</text>
    <rect x="24" y="330" width="236" height="34" rx="8" class="chip"/>
    <text x="42" y="353" class="small">sku</text>
    <rect x="24" y="374" width="236" height="34" rx="8" class="chip"/>
    <text x="42" y="397" class="small">color_no</text>
  </g>

  <path class="line" d="M376 376 C414 376, 414 376, 452 376"/>
  <polygon points="452,376 438,367 438,385" fill="#2dd4bf"/>

  <g transform="translate(460 158)">
    <rect class="panel" width="296" height="434" rx="18"/>
    <text x="24" y="42" class="label">Fdesign 商品位</text>
    <text x="24" y="70" class="sub">把变量加入同一个商品位</text>
    <rect x="24" y="100" width="248" height="48" rx="12" fill="url(#teal)" opacity="0.95"/>
    <text x="46" y="131" fill="#06231f" font-size="20" font-weight="800">商品位 1</text>
    <g transform="translate(24 174)">
      <rect class="chip" width="248" height="42" rx="10"/>
      <text x="18" y="27" class="code">hero_image → hero_image</text>
      <rect y="58" class="chip" width="248" height="42" rx="10"/>
      <text x="18" y="85" class="code">title → title</text>
      <rect y="116" class="chip" width="248" height="42" rx="10"/>
      <text x="18" y="143" class="code">sku → sku</text>
      <rect y="174" class="chip" width="248" height="42" rx="10"/>
      <text x="18" y="201" class="code">color_no → color_no</text>
    </g>
    <text x="24" y="406" class="sub">变量名同字段名，第一次排查最省心。</text>
  </g>

  <path class="line" d="M776 376 C814 376, 814 376, 852 376"/>
  <polygon points="852,376 838,367 838,385" fill="#2dd4bf"/>

  <g transform="translate(860 158)">
    <rect class="panel" width="268" height="434" rx="18"/>
    <text x="24" y="42" class="label">CSV 第一行</text>
    <text x="24" y="70" class="sub">来自 sample-products.csv</text>
    <rect x="24" y="102" width="220" height="52" rx="12" fill="#14324c" stroke="#57a6ff"/>
    <text x="42" y="135" fill="#eaf2ff" font-size="19" font-weight="800">FDX1001-C10</text>
    <rect x="24" y="184" width="220" height="34" rx="8" class="chip"/>
    <text x="42" y="207" class="small">title: FDX1001 C10...</text>
    <rect x="24" y="230" width="220" height="34" rx="8" class="chip"/>
    <text x="42" y="253" class="small">sku: FDX1001-C10</text>
    <rect x="24" y="276" width="220" height="34" rx="8" class="chip"/>
    <text x="42" y="299" class="small">color_no: C10</text>
    <rect x="24" y="322" width="220" height="34" rx="8" class="chip"/>
    <text x="42" y="345" class="small">hero_image: images/...</text>
    <text x="24" y="406" class="sub">先跑这一条，再批量跑完整 CSV。</text>
  </g>

  <g transform="translate(72 620)">
    <rect x="0" y="0" width="1056" height="38" rx="12" fill="#0f1d30" stroke="rgba(255,255,255,0.12)"/>
    <circle cx="24" cy="19" r="6" fill="#2dd4bf"/>
    <text x="44" y="25" fill="#dbeafe" font-size="17">公开反馈只提交变量名、字段名、最短复现和错误摘要；不要提交私有 PSD、真实商品图或敏感业务资料。</text>
  </g>
</svg>
